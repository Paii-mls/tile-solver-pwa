<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1E88E5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Tile Solver PWA v10.1 Clean</title>
</head>
<body>
<header>
  <div class="title">Tile Solver PWA v10.1 (Clean)</div>
  <div class="subtitle">Icon-only • แก้กรอบซ้ำด้วย NMS • มี Self-test • Mac test pack</div>
</header>
<main>
  <section class="panel">
    <div class="row">
      <button id="btnPaste" class="btn primary">📋 วางรูป</button>
      <label class="btn"><input id="upload" type="file" accept="image/*" />📷 เลือกรูป</label>
      <button id="btnReset" class="btn secondary">ล้าง</button>
    </div>
    <div class="row">
      <button id="btnAnalyze" class="btn primary big">🧠 วิเคราะห์ Icon</button>
      <button id="btnApply" class="btn success big">✅ กดแล้ว</button>
      <button id="btnUndo" class="btn">↩️ Undo</button>
    </div>
    <div class="row">
      <button id="btnEdit" class="btn">✏️ แก้ไข</button>
      <button id="btnSuggest" class="btn">✨ แนะนำใหม่</button>
      <button id="btnClearTray" class="btn secondary">ล้างถาด</button>
    </div>
    <div id="editPanel" class="editPanel hidden">
      <div class="row"><div class="field"><label>ขนาด Icon: <span id="iconSizeLabel">48</span> px</label><input id="iconSize" type="range" min="28" max="90" value="48"/></div></div>
      <div class="row"><div class="field"><label>ขั้นต่ำ Confidence: <span id="confLabel">70</span>%</label><input id="confThreshold" type="range" min="45" max="95" value="70"/></div></div>
      <div class="row">
        <button id="btnRedetect" class="btn">🎯 Detect Icon ใหม่</button>
        <button id="btnSelfTest" class="btn">🧪 Self-test</button>
        <button id="btnActivateSelected" class="btn">✅ เปิด/ปิดที่เลือก</button>
        <button id="btnDelete" class="btn secondary">🗑️ ลบที่เลือก</button>
      </div>
      <div class="row"><label>ตั้ง Type:</label><select id="typeSelect"></select><button id="btnSetType" class="btn">ตั้ง Type</button></div>
      <div class="hint">Self-test คาดหวัง PASS 13/13 และ 1 template = 1 detection</div>
    </div>
    <div class="box"><div class="boxTitle">Template Library</div><div id="templateView" class="templateView"></div></div>
    <div class="box"><div class="boxTitle">ถาด</div><div id="trayView" class="tray"></div><div id="trayMeta" class="small"></div></div>
    <div class="box"><div class="boxTitle">ผลลัพธ์</div><div id="result" class="result">กำลังโหลด Template...</div></div>
  </section>
  <section class="canvasWrap">
    <div class="canvasHint">กรอบรอบ icon เท่านั้น • ไม่ลาก/ไม่ขยับภาพ • กรอบแดง = แนะนำให้กด</div>
    <canvas id="canvas"></canvas>
  </section>
</main>
<footer><span class="small">PWA v10.1 clean</span></footer>
<div id="pasteCatcher" contenteditable="true"></div>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
